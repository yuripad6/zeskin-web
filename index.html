<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeSkin — Скины Minecraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('https://skinsync.gamer.free/img/night.png') no-repeat center fixed;
            background-size: cover;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        body.light {
            background: url('https://skinsync.gamer.free/img/day.png') no-repeat center fixed;
            background-size: cover;
            color: #24292f;
        }
        body.light::before { background: rgba(255, 255, 255, 0.3); }
        .content { position: relative; z-index: 1; }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1001;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #f78166);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .navbar a { color: #c9d1d9; text-decoration: none; font-weight: 600; }
        .btn-login { background: linear-gradient(135deg, #238636, #1f6feb); color: #fff !important; padding: 8px 16px; border-radius: 8px; }
        body.light .navbar { background: rgba(88, 166, 255, 0.9); }
        body.light .navbar a { color: #fff; }

        .hero { text-align: center; padding: 150px 20px 60px; }
        h1 { font-size: 3em; font-weight: 900; background: linear-gradient(135deg, #58a6ff, #f78166); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-btn, .lang-btn {
            position: fixed; right: 20px;
            width: 48px; height: 48px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(10px);
            color: #c9d1d9; font-size: 20px;
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-btn { top: 80px; }
        .lang-btn { top: 140px; font-size: 14px; font-weight: 700; width: auto; padding: 0 14px; border-radius: 50px; }

        .lang-dropdown {
            position: fixed; top: 190px; right: 20px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 8px;
            z-index: 999; display: none; min-width: 160px;
        }
        .lang-dropdown.show { display: block; }
        .lang-dropdown button {
            display: block; width: 100%;
            padding: 10px 16px; background: none; border: none;
            color: #c9d1d9; text-align: left; border-radius: 10px;
            cursor: pointer; font-size: 14px;
        }
        .lang-dropdown button:hover { background: rgba(88, 166, 255, 0.15); }
        .lang-dropdown button.active { background: rgba(88, 166, 255, 0.25); color: #58a6ff; }

        .skins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .skin-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .skin-card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        .skin-card img { image-rendering: pixelated; width: 64px; height: 64px; border-radius: 8px; }

        .social-btns { margin-top: 20px; }
        .social-btns a {
            display: inline-block; padding: 10px 20px; margin: 5px;
            border-radius: 50px; text-decoration: none; color: #fff;
            font-weight: 600; font-size: 14px;
        }
        .btn-modrinth { background: #1bd96a; }
        .btn-spigot { background: #ed8106; }
        .btn-discord { background: #5865F2; }
        .btn-boosty { background: #f472b6; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        footer { text-align: center; padding: 30px; color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="wiki.html">📚 Wiki</a>
        <a href="index.html" class="navbar-brand">🎮 ZeSkin</a>
        <div>
            <a href="login.html" class="btn-login">🔑 Войти</a>
        </div>
    </nav>

    <button class="theme-btn" id="themeBtn">🌙</button>
    <button class="lang-btn" id="langBtn">🌐 RU</button>
    <div class="lang-dropdown" id="langDropdown">
        <button onclick="setLang('ru')" class="active" data-lang="ru">🇷🇺 Русский</button>
        <button onclick="setLang('en')" data-lang="en">🇬🇧 English</button>
        <button onclick="setLang('de')" data-lang="de">🇩🇪 Deutsch</button>
        <button onclick="setLang('fr')" data-lang="fr">🇫🇷 Français</button>
        <button onclick="setLang('es')" data-lang="es">🇪🇸 Español</button>
    </div>

    <div class="content">
        <div class="hero">
            <h1>🎮 ZeSkin</h1>
            <p style="font-size: 20px; margin-top: 10px;">Загрузи свой скин и он появится на всех серверах!</p>
            <div class="social-btns">
                <a href="#" class="btn-modrinth">Modrinth</a>
                <a href="#" class="btn-spigot">Spigot</a>
                <a href="#" class="btn-discord">Discord</a>
                <a href="#" class="btn-boosty">Boosty</a>
            </div>
        </div>
        <div class="container">
            <h2 style="margin-bottom: 20px;">📸 Последние скины</h2>
            <div class="skins-grid" id="skinsGrid"><p>Загрузка...</p></div>
        </div>
        <footer><p>Made by <strong>ZellarTM</strong></p></footer>
    </div>

    <script>
        const API = 'https://skinsync.gamer.free/api';
        async function loadSkins() {
            try {
                const res = await fetch(API + '/get_skins.php');
                const skins = await res.json();
                document.getElementById('skinsGrid').innerHTML = skins.map(s => `
                    <div class="skin-card">
                        <img src="https://skinsync.gamer.free/skin/${s.username}.png" alt="${s.username}">
                        <div style="font-weight:bold;margin-top:5px;">${s.username}</div>
                        <div style="font-size:11px;color:#58a6ff;cursor:pointer;margin-top:5px;" onclick="copyUrl('https://skinsync.gamer.free/skin/${s.username}.png')">📋 Копировать</div>
                    </div>
                `).join('') || '<p>Пока нет скинов.</p>';
            } catch(e) { document.getElementById('skinsGrid').innerHTML = '<p>Ошибка загрузки</p>'; }
        }
        function copyUrl(url) { navigator.clipboard.writeText(url); alert('URL скопирован!'); }

        const themeBtn = document.getElementById('themeBtn');
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); themeBtn.textContent = '☀️'; }
        themeBtn.onclick = () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeBtn.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };

        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        const langNames = { ru: 'RU', en: 'EN', de: 'DE', fr: 'FR', es: 'ES' };
        let currentLang = localStorage.getItem('lang') || 'ru';
        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            langBtn.textContent = '🌐 ' + langNames[lang];
            langDropdown.classList.remove('show');
        }
        setLang(currentLang);
        langBtn.onclick = (e) => { e.stopPropagation(); langDropdown.classList.toggle('show'); };
        document.addEventListener('click', () => langDropdown.classList.remove('show'));

        loadSkins();
    </script>
</body>
</html>
