<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ZeSkin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('https://skinsync.gamer.free/img/night.png') no-repeat center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }
        .card {
            position: relative; z-index: 1;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #58a6ff, #f78166);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control {
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            color: #c9d1d9;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn {
            background: linear-gradient(135deg, #238636, #1f6feb);
            border: none; color: #fff;
            font-weight: 700; padding: 12px;
            border-radius: 10px; width: 100%;
            cursor: pointer; font-size: 16px;
        }
        .oauth-btn {
            display: block; padding: 10px; border-radius: 10px;
            text-align: center; text-decoration: none; color: #fff;
            font-weight: 600; margin: 5px 0;
        }
        .btn-github { background: #333; }
        .btn-discord { background: #5865F2; }
        .btn-google { background: #ea4335; }
        .divider { text-align: center; margin: 15px 0; color: #8b949e; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 ZeSkin</h1>
        
        <div class="divider">Вход через:</div>
        <a href="https://skinsync.gamer.free/oauth.php?provider=github" class="oauth-btn btn-github">💻 GitHub</a>
        <a href="https://skinsync.gamer.free/oauth.php?provider=discord" class="oauth-btn btn-discord">🎮 Discord</a>
        <a href="https://skinsync.gamer.free/oauth.php?provider=google" class="oauth-btn btn-google">📧 Google</a>
        
        <div class="divider">— или —</div>
        <form onsubmit="login(event)">
            <input type="email" id="email" class="form-control" placeholder="Email" required>
            <input type="password" id="pass" class="form-control" placeholder="Пароль" required>
            <button type="submit" class="btn">🔑 Войти</button>
        </form>
        
        <div class="back-link"><a href="index.html">← На главную</a></div>
    </div>
    <script>
        async function login(e) {
            e.preventDefault();
            const res = await fetch('https://skinsync.gamer.free/api/auth.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'login',
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = 'index.html?token=' + data.token + '&name=' + data.username;
            } else {
                alert(data.message || 'Ошибка');
            }
        }
    </script>
</body>
</html>
